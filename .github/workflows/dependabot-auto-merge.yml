name: Auto-merge Dependabot PRs

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: >
      github.actor == 'dependabot[bot]' &&
      github.event.pull_request.user.login == 'dependabot[bot]' &&
      github.event.pull_request.base.ref == 'main'
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@08eff52bf64351f401fb50d4972fa95b9f2c2d1b # v2.4.0
        with:
          github-token: {% raw %}${{ secrets.GITHUB_TOKEN }}{% endraw %}

      - name: Evaluate auto-merge policy
        id: policy
        run: |
          set -euo pipefail
          update_type='{% raw %}${{ steps.metadata.outputs.update-type }}{% endraw %}'
          dependency_type='{% raw %}${{ steps.metadata.outputs.dependency-type }}{% endraw %}'

          if [[ "$update_type" == "security:update" ]]; then
            echo "allowed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "$dependency_type" == "direct:production" ]] && [[ "$update_type" == "version-update:semver-patch" || "$update_type" == "version-update:semver-minor" ]]; then
            echo "allowed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "allowed=false" >> "$GITHUB_OUTPUT"
          echo "Skipping auto-merge for update_type=$update_type dependency_type=$dependency_type"

      - name: Approve PR
        if: steps.policy.outputs.allowed == 'true'
        run: gh pr review --approve "$PR_URL"
        env:
          PR_URL: {% raw %}${{ github.event.pull_request.html_url }}{% endraw %}
          GH_TOKEN: {% raw %}${{ secrets.GITHUB_TOKEN }}{% endraw %}

      - name: Enable auto-merge
        if: steps.policy.outputs.allowed == 'true'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: {% raw %}${{ github.event.pull_request.html_url }}{% endraw %}
          GH_TOKEN: {% raw %}${{ secrets.GITHUB_TOKEN }}{% endraw %}
