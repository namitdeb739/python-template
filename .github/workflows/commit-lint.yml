name: Commit Lint

on:
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
      - run: uv sync --dev
      - name: Validate commit messages
        run: |
          uv run cz check --rev-range origin/main..HEAD
